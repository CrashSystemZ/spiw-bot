services:
  cobalt:
    image: ghcr.io/imputnet/cobalt:latest
    container_name: spiw-cobalt
    environment:
      API_URL: http://cobalt:9000/
    ports:
      - "${COBALT_HOST_PORT:-9000}:9000"
    restart: unless-stopped

  bot:
    image: spiw-bot:latest
    container_name: spiw-bot
    depends_on:
      - cobalt
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      TG_API_ID: ${TG_API_ID}
      TG_API_HASH: ${TG_API_HASH}
      DB_PATH: ${DB_PATH:-/app/data/spiw.sqlite}
      SESSION_PATH: ${SESSION_PATH:-/tmp/mtcute.session}
      COBALT_BASE_URL: http://cobalt:9000
      COBALT_AUTHORIZATION: ${COBALT_AUTHORIZATION:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      INLINE_RESOLVE_TIMEOUT_MS: ${INLINE_RESOLVE_TIMEOUT_MS:-5000}
      REQUEST_TTL_SECONDS: ${REQUEST_TTL_SECONDS:-5400}
      REHYDRATE_TTL_SECONDS: ${REHYDRATE_TTL_SECONDS:-432000}
      METADATA_TTL_SECONDS: ${METADATA_TTL_SECONDS:-432000}
      UI_STATE_TTL_SECONDS: ${UI_STATE_TTL_SECONDS:-432000}
      MAX_CONCURRENT_JOBS: ${MAX_CONCURRENT_JOBS:-32}
      MAX_FETCHES_PER_JOB: ${MAX_FETCHES_PER_JOB:-4}
      MEDIA_BUFFER_BUDGET_BYTES: ${MEDIA_BUFFER_BUDGET_BYTES:-2147483648}
      MAX_MEDIA_ITEM_BYTES: ${MAX_MEDIA_ITEM_BYTES:-2147483648}
    volumes:
      - ./data:/app/data
    read_only: true
    tmpfs:
      - /tmp:size=256m
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 15s
    restart: unless-stopped
